services:
  # ── Backend (Django) ──────────────────────────────────────────────────────
  - type: web
    name: internship-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://internship-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: internship-db
          property: connectionString

  # ── Frontend (React/Vite) ─────────────────────────────────────────────────
  - type: web
    name: internship-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://internship-backend.onrender.com/api/"

# ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: internship-db
    plan: free
